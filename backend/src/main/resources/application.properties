spring.application.name=backend
# ==========================================
# Configuracoes do Banco de Dados PostgreSQL
# ==========================================
spring.datasource.url=${DB_URL_PORTFOLIO}
spring.datasource.username=${DB_USER_PORTFOLIO}
spring.datasource.password=${DB_PASSWORD_PORTFOLIO}
spring.datasource.driver-class-name=${DB_DRIVER_PORTFOLIO}

# ==========================================
# Configuracoes do JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect